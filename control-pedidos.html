<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Pedidos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gestión de Pedidos</h1>

    <section class="formulario">
        <img src="logo.jpeg" alt="Logo" class="logo-formulario">
        <h2>Nuevo Pedido</h2>

        <form id="pedidoForm">
            <label>Cliente</label>
            <input type="text" id="cliente" required>

            <label>Fecha Pedido</label>
            <input type="date" id="fechaPedido">

            <label>Fecha Entrega</label>
            <input type="date" id="fechaEntrega" required>

            <label>Categoría</label>
            <input type="text" id="categoria">

            <h3>Productos</h3>

            <div id="productosContainer"></div>

            <button type="button" id="agregarProductoBtn">+ Agregar Producto</button>

            <div class="totales">
                <label>Total</label>
                <input type="text" id="total" readonly>

                <label>Abonado</label>
                <input type="number" id="abonado" value="0" min="0">

                <label>Saldo</label>
                <input type="text" id="saldo" readonly>
            </div>

            <button type="submit">Guardar Pedido</button>
        </form>

    </section>

    <hr>

    <section>
        <h2>Pedidos</h2>

        <div class="acciones-datos">
            <button id="exportarBtn">Exportar Datos</button>
            <input type="file" id="importarInput" accept=".json" hidden>
            <button id="importarBtn">Importar Datos</button>
        </div>

        <div class="filtros">
            <button data-filtro="todos">Todos (<span id="countTodos">0</span>)</button>
            <button data-filtro="Pendiente">Pendientes (<span id="countPendientes">0</span>)</button>
            <button data-filtro="Entregado">Entregados (<span id="countEntregados">0</span>)</button>

            <input type="text" id="busqueda" placeholder="Buscar..."> 
        </div>

        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Descripción</th>
                    <th>Categoría</th>
                    <th>Fecha Pedido</th>
                    <th>Entrega</th>
                    <th>Total</th>
                    <th>Abonado</th>
                    <th>Saldo</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            
            <tbody id="tablaPedidos"></tbody>
        </table>
    </section>

    <script src="app.js"></script>
</body>
</html>
